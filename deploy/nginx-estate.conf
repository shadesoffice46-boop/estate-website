# ============================================================================
# ESTATE — nginx reverse proxy for the Next.js app (PM2 on 127.0.0.1:3001)
#
# Goal: serve the site over HTTPS on <DOMAIN>, redirect HTTP→HTTPS, and make
# the Node app reachable ONLY via the proxy (bind PM2 to localhost).
#
# Install:
#   1. Replace <DOMAIN> below with your real domain (e.g. estate.example.com).
#   2. sudo cp deploy/nginx-estate.conf /etc/nginx/sites-available/estate
#   3. sudo ln -s /etc/nginx/sites-available/estate /etc/nginx/sites-enabled/estate
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d <DOMAIN>      # provisions + wires up the TLS cert
#
# Make PM2 listen on localhost only (so port 3001 is not public):
#   pm2 delete estate
#   PORT=3001 HOSTNAME=127.0.0.1 pm2 start "npm start" --name estate
#   pm2 save
# (The deploy scripts already restart by name; set HOSTNAME=127.0.0.1 in .env.local too.)
# ============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    # Allow Let's Encrypt HTTP-01 challenge, redirect everything else.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name <DOMAIN>;

    # certbot fills these in (paths shown for reference):
    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers (defense-in-depth; app also sets its own).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Pass the real client IP through so the app can hash it correctly.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
